<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>DiagnoseHUB</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #f8fafc;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 50% 18%, rgba(37, 99, 235, 0.28), transparent 34%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }

      .brand {
        font-size: clamp(2rem, 10vw, 4rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.95;
      }

      .status {
        color: #cbd5e1;
        font-size: 1rem;
        font-weight: 700;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">DiagnoseHUB</div>
      <div class="status">App wird geladen...</div>
    </main>
  </body>
</html>
